<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>SubZero Cash Flow</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --navy: #0b2c4d;
                --navy-2: #123a63;
                --cyan: #19b6e0;
                --cyan-dark: #0f8fb3;
                --ink: #1c2b3a;
                --muted: #6b8299;
                --line: #d6e4ee;
            }
            * { box-sizing: border-box; }
            .staticrypt-html { height: 100%; }
            .staticrypt-body { height: 100%; margin: 0; }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background: linear-gradient(135deg, #0b2c4d 0%, #123a63 55%, #0f8fb3 140%);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                width: 100%;
                max-width: 380px;
                padding: 38px 38px 30px;
                border-radius: 16px;
                text-align: center;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            }

            .sz-brand {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 11px;
                margin-bottom: 4px;
            }
            .sz-mark {
                width: 44px;
                height: 44px;
                border-radius: 11px;
                background: var(--cyan);
                color: var(--navy);
                font-weight: 800;
                font-size: 21px;
                display: flex;
                align-items: center;
                justify-content: center;
                letter-spacing: .5px;
            }
            .sz-name {
                text-align: left;
            }
            .sz-name .t {
                font-size: 19px;
                font-weight: 750;
                color: var(--navy);
                line-height: 1.15;
            }
            .sz-name .s {
                font-size: 11px;
                font-weight: 600;
                color: var(--cyan-dark);
                text-transform: uppercase;
                letter-spacing: .8px;
            }
            .staticrypt-instructions {
                margin: 16px 0 4px;
            }
            .staticrypt-title {
                font-size: 15px;
                font-weight: 700;
                color: var(--ink);
                margin: 0;
            }
            .sz-sub {
                font-size: 12.5px;
                color: var(--muted);
                margin: 5px 0 0;
            }

            .staticrypt-hr {
                margin: 20px 0;
                border: 0;
                border-top: 1px solid var(--line);
            }

            .staticrypt-password-container {
                position: relative;
                background: #f1f6fa;
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 9px;
                margin: 0 0 14px;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 15px;
                outline: 0;
                padding: 14px 44px 14px 15px;
                width: 100%;
                color: var(--ink);
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 19px;
                width: 19px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: .5px;
                outline: 0;
                background: var(--cyan);
                width: 100%;
                border: 0;
                border-radius: 9px;
                padding: 14px;
                color: var(--navy);
                font-size: 13.5px;
                font-weight: 800;
                cursor: pointer;
                transition: filter .15s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(94%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12.5px;
                color: var(--muted);
                margin-bottom: 14px;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 10px;
                accent-color: var(--cyan-dark);
            }

            .sz-foot {
                margin-top: 18px;
                font-size: 10.5px;
                color: var(--muted);
                letter-spacing: .3px;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0b2c4d;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(255, 255, 255, 0.25);
                border-right-color: #19b6e0;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
